<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法規自動監控與鑑別系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i data-lucide="file-text"></i>
            </div>
            <h1 class="text-xl font-bold text-gray-700">法規自動監控與鑑別系統</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="handleRefresh()" class="p-2 hover:bg-gray-100 rounded-full transition">
                <i data-lucide="refresh-cw" id="refresh-icon"></i>
            </button>
            <button class="p-2 hover:bg-gray-100 rounded-full relative">
                <i data-lucide="bell"></i>
                <span class="absolute top-1 right-1 bg-red-500 text-white text-[10px] rounded-full px-1.5 border-2 border-white">2</span>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <header class="mb-10">
            <h2 class="text-4xl font-extrabold text-gray-900 mb-2">最新法規動態</h2>
            <p class="text-gray-500">目前監控範圍：職業安全、勞動條件、環境保護</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-400 font-medium mb-2">今日更新</p>
                <div class="text-5xl font-bold text-blue-600">3 <span class="text-xl">筆</span></div>
            </div>
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-400 font-medium mb-2">待鑑別項目</p>
                <div class="text-5xl font-bold text-gray-700">12 <span class="text-xl">筆</span></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="font-bold text-gray-700 text-lg">法規鑑別與條文對照報告</h3>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition">
                    <i data-lucide="download" class="w-4 h-4"></i> 匯出 Excel
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="report-table">
                    <thead class="bg-blue-900 text-white">
                        <tr>
                            <th class="px-6 py-4">條次</th>
                            <th class="px-6 py-4">修正前條文</th>
                            <th class="px-6 py-4">修正後條文</th>
                            <th class="px-6 py-4">修法理由與企業對應建議</th>
                            <th class="px-6 py-4 text-center">影響程度</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr>
                            <td class="px-6 py-4 font-bold text-blue-700">第 15-1 條(新增)</td>
                            <td class="px-6 py-4 text-gray-400 italic">(無)</td>
                            <td class="px-6 py-4 text-sm text-gray-600">建設工程之業主應於規劃設計階段實施風險評估...</td>
                            <td class="px-6 py-4 text-sm text-gray-600">強化源頭管理責任，防止工程風險層層轉嫁。</td>
                            <td class="px-6 py-4 text-center"><span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-xs font-bold">高</span></td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4 font-bold text-blue-700">第 41 條</td>
                            <td class="px-6 py-4 text-sm text-gray-500 line-through">違反者處新台幣 30 萬元以下罰金...</td>
                            <td class="px-6 py-4 text-sm text-red-600 font-medium">違反者處新台幣 150 萬元以下罰金...最高處 5 年有期徒刑。</td>
                            <td class="px-6 py-4 text-sm text-gray-600">提高刑事責任與罰金上限，強化嚇阻力。</td>
                            <td class="px-6 py-4 text-center"><span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-bold">極高</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // 1. 初始化圖示
        lucide.createIcons();

        // 2. 模擬刷新功能 (對應代碼中的 handleRefresh)
        function handleRefresh() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            setTimeout(() => {
                icon.classList.remove('animate-spin');
                alert('法規資料已同步完成！');
            }, 1000);
        }

        // 3. 匯出 Excel 功能 (對應代碼中的 handleExportExcel)
        function exportToExcel() {
            const table = document.getElementById('report-table');
            const html = table.outerHTML;
            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `法規鑑別對照表_${new Date().toLocaleDateString()}.xls`;
            a.click();
        }
    </script>
</body>
</html>
